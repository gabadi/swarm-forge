# Format: window <role> <agent> <worktree> [task|batch]
# The optional receive mode defaults to task. Use batch for roles that should
# consume all currently queued equal-priority handoffs as one batch.
window specifier codex specifier
window coder codex coder
window ux-engineer codex ux-engineer
window cleaner codex cleaner
window architect codex architect
window hardender codex hardender batch
window QA codex QA
window integrator codex integrator
window curator codex curator
